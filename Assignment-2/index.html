
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <h1> Async Weather Tracker</h1>

    <div class="top">
        <div class="weatherForm">
            <h3>Search City</h3>
            <form id="form">
                <input type="text" id="city" placeholder="Delhi, London..." required>
                <button type="submit">Search</button>
            </form>

            <h3>Search History</h3>
            <div class="historyBtn"></div>
        </div>

       
        <div class="info">
            <h3>Weather Info</h3>
            <p>Search a city to see weather</p>
        </div>
    </div>

   
    <div class="consoleBox">
        <h3>Console  Event Loop</h3>
        <div class="console"></div>
    </div>

    <script src="script1.js"></script>
</body>
</html>
</html>
